name = "currency-converter"
main = "src/index.ts"
compatibility_date = "2024-10-22"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "currency-db"
database_id = "local"

[[durable_objects.bindings]]
name = "RATE_TICKER"
class_name = "RateTicker"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RateTicker"]

[triggers]
crons = ["*/1 * * * *"]

[assets]
directory = "./public"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/ws"]
